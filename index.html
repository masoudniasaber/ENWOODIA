<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CLT Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">
    <h2>CLT Config Tool</h2>

    <label>CLT Supplier</label>
    <select id="supplier"></select>

    <label>CLT Layup</label>
    <select id="layup"></select>

    <label>Floor Surface & Topping</label>
    <select id="floor"></select>

    <label>Ceiling, Insulation & Lining</label>
    <select id="ceiling"></select>

    <!-- Layers -->
    <div id="layers"></div>

    <!-- Sketch -->
    <div id="sketch"></div>

    <!-- Notes / Results -->
    <div id="results">
        <h3>Notes and Advice</h3>

        <p id="note-main"></p>

        <h4>Compliance Requirement (NZBC G6)</h4>
        <p id="note-compliance"></p>

        <h4>Performance Improvement</h4>
        <p id="note-improve"></p>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
